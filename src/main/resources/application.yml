spring:
  datasource:
    url: jdbc:mysql://localhost:3306/attendance?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456

  # 新增静态资源配置
  web:
    resources:
      static-locations: classpath:/static/,classpath:/META-INF/resources/

  # MVC配置
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    thymeleaf:
      cache: false
      prefix: classpath:/templates/
      suffix: .html
      # 新增静态资源路径匹配规则
      static-path-pattern: /static/**

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    servlet:
      content-type: text/html

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.test.sshProject.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开启SQL日志

# 分页插件配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# 新增会话配置
server:
  servlet:
    session:
      timeout: 30m  # 会话超时时间
      cookie:
        name: JSESSIONID
        http-only: true
        secure: false
        path: /
        max-age: 1800

# 自定义配置
app:
  attendance:
    default-work-start-time: 09:00:00
    default-work-end-time: 18:00:00
    default-normal-work-hours: 8.0
    default-late-threshold: 15  # 迟到阈值(分钟)
    default-early-threshold: 15 # 早退阈值(分钟)