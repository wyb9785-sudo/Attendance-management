<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>我的考勤</title>
  <link rel="stylesheet" th:href="@{/static/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
<header class="bg-primary text-white">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center py-3">
      <h1 class="h4 mb-0">我的考勤</h1>
      <nav>
        <a class="text-white mx-2" th:href="@{/employee/attendance}"><i class="bi bi-calendar-check"></i> 我的考勤</a>
        <a class="text-white mx-2" th:href="@{/employee/leave}"><i class="bi bi-clock-history"></i> 请假申请</a>
        <a class="text-white mx-2" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> 退出</a>
      </nav>
    </div>
  </div>
</header>

<main class="container my-4">
  <div class="row">
    <div class="col-md-4">
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-light">
          <h2 class="h5 mb-0">今日考勤</h2>
        </div>
        <div class="card-body text-center">
          <div id="attendance-status" class="mb-3">
            <div class="alert alert-info">
              <p id="emp-sign-in-info">签到时间: 未签到</p>
              <p id="emp-sign-out-info">签退时间: 未签退</p>
              <p id="emp-attendance-state" class="mb-0">状态: 未签到</p>
            </div>
          </div>
          <div class="d-grid gap-2">
            <button id="sign-in-btn" class="btn btn-success">
              <i class="bi bi-box-arrow-in-right"></i> 签到
              <div id="emp-sign-in-message" class="small text-muted mt-1"></div>
            </button>
            <button id="sign-out-btn" class="btn btn-warning" disabled>
              <i class="bi bi-box-arrow-right"></i> 签退
              <div id="emp-sign-out-message" class="small text-muted mt-1"></div>
            </button>
          </div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-light">
          <h2 class="h5 mb-0">本月统计</h2>
        </div>
        <div class="card-body">
          <canvas id="monthStatsChart" height="200"></canvas>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-light d-flex justify-content-between align-items-center">
          <h2 class="h5 mb-0">考勤记录</h2>
          <div class="d-flex">
            <select class="form-select form-select-sm me-2" id="year-filter" style="width: 100px;"></select>
            <select class="form-select form-select-sm me-2" id="month-filter" style="width: 100px;"></select>
            <button id="filter-btn" class="btn btn-sm btn-primary">筛选</button>
          </div>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-striped table-hover">
              <thead class="table-light">
              <tr>
                <th>日期</th>
                <th>星期</th>
                <th>签到时间</th>
                <th>签退时间</th>
                <th>工作时长</th>
                <th>状态</th>
                <th>备注</th>
              </tr>
              </thead>
              <tbody id="attendance-records">
              <!-- 数据将通过JS动态加载 -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  // 初始化年份和月份选择器
  function initDateFilters() {
    const yearSelect = document.getElementById('year-filter');
    const monthSelect = document.getElementById('month-filter');
    const currentDate = new Date();
    const currentYear = currentDate.getFullYear();
    const currentMonth = currentDate.getMonth() + 1;

    // 添加年份选项（当前年及前后2年）
    for (let year = currentYear - 2; year <= currentYear + 2; year++) {
      const option = document.createElement('option');
      option.value = year;
      option.textContent = year + '年';
      if (year === currentYear) {
        option.selected = true;
      }
      yearSelect.appendChild(option);
    }

    // 添加月份选项
    for (let month = 1; month <= 12; month++) {
      const option = document.createElement('option');
      option.value = month;
      option.textContent = month + '月';
      if (month === currentMonth) {
        option.selected = true;
      }
      monthSelect.appendChild(option);
    }
  }

  // 加载考勤数据
  async function loadAttendanceData() {
    try {
      const year = document.getElementById('year-filter').value;
      const month = document.getElementById('month-filter').value;

      const response = await fetch(`/api/employee/attendance/detail?year=${year}&month=${month}`, {
        credentials: 'include'
      });
      if (!response.ok) {
        throw new Error('获取考勤数据失败');
      }
      const data = await response.json();
      renderAttendanceData(data);
      updateTodayStatus(data);
    } catch (error) {
      console.error('加载考勤数据出错:', error);
      alert('加载考勤数据出错: ' + error.message);
    }
  }

  // 渲染考勤数据到表格
  function renderAttendanceData(data) {
    const tbody = document.getElementById('attendance-records');
    tbody.innerHTML = '';

    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

    data.forEach(record => {
      const row = document.createElement('tr');
      const date = new Date(record.recordDate);
      const weekday = weekdays[date.getDay()];

      row.innerHTML = `
            <td>${record.recordDate}</td>
            <td>星期${weekday}</td>
            <td>${record.signInTime || '-'}</td>
            <td>${record.signOutTime || '-'}</td>
            <td>${record.workHours ? record.workHours.toFixed(1) + '小时' : '-'}</td>
            <td>${record.status || '-'}</td>
            <td>${record.remark || '-'}</td>
        `;
      tbody.appendChild(row);
    });
  }

  // 更新今日考勤状态
  function updateTodayStatus(data) {
    const today = new Date().toISOString().split('T')[0];
    const todayRecord = data.find(record => record.recordDate === today);
    const signInBtn = document.getElementById('sign-in-btn');
    const signOutBtn = document.getElementById('sign-out-btn');

    if (todayRecord) {
      if (todayRecord.signInTime) {
        signInBtn.disabled = true;
        // **关键修复**：若已签到但未签退，启用签退按钮
        signOutBtn.disabled = !todayRecord.signOutTime; // 未签退则启用
      }
    } else {
      // 今日无记录时，重置按钮状态
      signInBtn.disabled = false;
      signOutBtn.disabled = true;
    }
  }

  // 签到功能
  document.getElementById('sign-in-btn').addEventListener('click', async () => {
    try {
      const btn = document.getElementById('sign-in-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 签到中...';

      const response = await fetch('/api/employee/attendance/sign-in', {
        method: 'POST',
        credentials: 'include'
      });

      const result = await response.json();
      if (response.ok) {
        // 更新UI状态
        document.getElementById('emp-sign-in-info').textContent = `签到时间: ${result.signInTime || '未签到'}`;
        document.getElementById('emp-sign-out-info').textContent = `签退时间: ${result.signOutTime || '未签退'}`;
        document.getElementById('emp-attendance-state').textContent = `状态: ${result.status || '已签到'}`;

        // 更新按钮状态
        document.getElementById('sign-out-btn').disabled = result.hasSignedOut;

        showNotification(result.message, 'success');
        await loadAttendanceData(); // 刷新数据
      } else {
        showNotification('签到失败: ' + (result.error || '未知错误'), 'error');
      }
    } catch (error) {
      showNotification('签到请求失败: ' + error.message, 'error');
    } finally {
      const btn = document.getElementById('sign-in-btn');
      btn.disabled = document.getElementById('emp-sign-in-info').textContent.includes('未签到') ? false : true;
      btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> 签到';
    }
  });

  // 签退功能
  document.getElementById('sign-out-btn').addEventListener('click', async () => {
    try {
      const response = await fetch('/api/employee/attendance/sign-out', {
        method: 'POST',
        credentials: 'include'
      });

      const result = await response.json();

      if (response.ok) {
        alert(result.message);
        loadAttendanceData(); // 刷新数据
      } else {
        alert('签退失败: ' + (result.error || '未知错误'));
      }
    } catch (error) {
      alert('签退请求失败: ' + error.message);
    }
  });
  // 添加检查当前签到状态的函数
  async function checkTodayAttendance() {
    try {
      const response = await fetch('/api/employee/attendance/today', {
        credentials: 'include'
      });
      if (response.ok) {
        const data = await response.json();
        const signInBtn = document.getElementById('sign-in-btn');
        const signOutBtn = document.getElementById('sign-out-btn');

        if (data.hasSignedIn) {
          signInBtn.disabled = true;
          signOutBtn.disabled = data.hasSignedOut; // 如果已签退则禁用，否则启用
        } else {
          signInBtn.disabled = false;
          signOutBtn.disabled = true;
        }
      }
    } catch (error) {
      console.error('检查签到状态失败:', error);
    }
  }
  // 筛选按钮
  document.getElementById('filter-btn').addEventListener('click', loadAttendanceData);

  // 初始化页面
  document.addEventListener('DOMContentLoaded', () => {
    checkTodayAttendance();
    initDateFilters();
    loadAttendanceData();

    // 初始化图表
    const ctx = document.getElementById('monthStatsChart').getContext('2d');
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['正常', '迟到', '早退', '缺勤'],
        datasets: [{
          data: [20, 3, 2, 1],
          backgroundColor: [
            '#28a745',
            '#ffc107',
            '#fd7e14',
            '#dc3545'
          ]
        }]
      }
    });
  });

</script>
</body>
</html>
