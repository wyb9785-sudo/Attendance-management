<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>请假申请</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        .status-正常 { color: green; }
        .status-工时不足 { color: orange; }
        .status-早退 { color: red; }
        .status-待审批 { color: blue; }
        .status-已通过 { color: green; }
        .status-已驳回 { color: red; }
    </style>
</head>
<body>
<header class="bg-primary text-white">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center py-3">
            <h1 class="h4 mb-0">我的考勤</h1>
            <nav>
                <a class="text-white mx-2" th:href="@{/employee/attendance}"><i class="bi bi-calendar-check"></i> 我的考勤</a>
                <a class="text-white mx-2" th:href="@{/employee/leave}"><i class="bi bi-clock-history"></i> 请假申请</a>
                <a class="text-white mx-2" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> 退出</a>
            </nav>
        </div>
    </div>
</header>

<main class="container my-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-light">
                    <h2 class="h5 mb-0">申请请假</h2>
                </div>
                <div class="card-body">
                    <form id="leave-form">
                        <div class="mb-3">
                            <label for="leave-type" class="form-label">请假类型</label>
                            <select class="form-select" id="leave-type" required>
                                <option value="">请选择</option>
                                <option value="事假">事假</option>
                                <option value="病假">病假</option>
                                <option value="公假">公假</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="start-date" class="form-label">开始日期</label>
                            <input type="date" class="form-control" id="start-date" required>
                        </div>
                        <div class="mb-3">
                            <label for="end-date" class="form-label">结束日期</label>
                            <input type="date" class="form-control" id="end-date" required>
                        </div>
                        <div class="mb-3">
                            <label for="reason" class="form-label">请假事由</label>
                            <textarea class="form-control" id="reason" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">提交申请</button>
                    </form>
                </div>
            </div>

        </div>

        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <h2 class="h5 mb-0">我的考勤记录</h2>
                    <div class="d-flex">
                        <select class="form-select form-select-sm me-2" id="year-filter">
                            <!-- 年份选项将通过JS动态生成 -->
                        </select>
                        <select class="form-select form-select-sm me-2" id="month-filter">
                            <!-- 月份选项将通过JS动态生成 -->
                        </select>
                        <button id="filter-btn" class="btn btn-sm btn-primary">
                            <i class="bi bi-arrow-clockwise"></i> 筛选
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead class="table-light">
                            <tr>
                                <th>日期</th>
                                <th>星期</th>
                                <th>签到时间</th>
                                <th>签退时间</th>
                                <th>工作时长</th>
                                <th>状态</th>
                                <th>备注</th>
                            </tr>
                            </thead>
                            <tbody id="attendance-records">
                            <!-- 考勤记录将通过JS动态加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <h2 class="h5 mb-0">我的请假记录</h2>
                    <div class="d-flex">
                        <select class="form-select form-select-sm me-2" id="status-filter">
                            <option value="all">全部状态</option>
                            <option value="待审批">待审批</option>
                            <option value="已通过">已通过</option>
                            <option value="已驳回">已驳回</option>
                        </select>
                        <button id="refresh-btn" class="btn btn-sm btn-primary">
                            <i class="bi bi-arrow-clockwise"></i> 刷新
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead class="table-light">
                            <tr>
                                <th>类型</th>
                                <th>日期</th>
                                <th>天数</th>
                                <th>事由</th>
                                <th>状态</th>
                                <th>审批意见</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody id="leave-records">
                            <!-- 请假记录将通过JS动态加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 显示通知函数
        function showNotification(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} position-fixed top-0 end-0 m-3`;
            alert.style.zIndex = '1000';
            alert.textContent = message;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }

        // 初始化日期筛选器
        function initYearSelect(selector) {
            const select = document.querySelector(selector);
            const currentYear = new Date().getFullYear();
            for (let year = currentYear - 5; year <= currentYear + 5; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                if (year === currentYear) option.selected = true;
                select.appendChild(option);
            }
        }

        function initMonthSelect(selector) {
            const select = document.querySelector(selector);
            const currentMonth = new Date().getMonth() + 1;
            for (let month = 1; month <= 12; month++) {
                const option = document.createElement('option');
                option.value = month;
                option.textContent = `${month}月`;
                if (month === currentMonth) option.selected = true;
                select.appendChild(option);
            }
        }

        initYearSelect('#year-filter');
        initMonthSelect('#month-filter');

        // 加载考勤记录
        async function loadAttendanceRecords() {
            const year = document.getElementById('year-filter').value;
            const month = document.getElementById('month-filter').value;

            try {
                const response = await fetch(`/api/employee/attendance/detail?year=${year}&month=${month}`, {
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error('加载记录失败');
                }

                const records = await response.json();
                displayAttendanceRecords(records);
            } catch (error) {
                showNotification('加载记录失败: ' + error.message, 'error');
                console.error('加载记录错误:', error);
            }
        }

        // 显示考勤记录
        function displayAttendanceRecords(records) {
            const tbody = document.getElementById('attendance-records');
            tbody.innerHTML = '';

            if (!records || records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">没有找到考勤记录</td></tr>';
                return;
            }

            records.forEach(record => {
                const row = document.createElement('tr');
                const date = new Date(record.recordDate);
                const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
                const weekday = weekdays[date.getDay()];

                // 处理未签到/未签退情况
                const signInTime = record.signInTime ? record.signInTime.substring(0, 5) : '未签到';
                const signOutTime = record.signOutTime ? record.signOutTime.substring(0, 5) : '未签退';
                const workHours = record.workHours ? record.workHours.toFixed(1) + '小时' : '-';
                const status = record.status || '未签到';

                row.innerHTML = `
                <td>${date.getMonth() + 1}月${date.getDate()}日</td>
                <td>星期${weekday}</td>
                <td>${signInTime}</td>
                <td>${signOutTime}</td>
                <td>${workHours}</td>
                <td class="status-${status}">${status}</td>
                <td>${record.remark || '-'}</td>
            `;
                tbody.appendChild(row);
            });
        }

        // 加载请假记录
        async function loadLeaveRecords() {
            const status = document.getElementById('status-filter').value;
            try {
                const response = await fetch(`/employee/leave/list?status=${status}`, {
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error('加载请假记录失败');
                }

                const leaves = await response.json();
                displayLeaveRecords(leaves);
            } catch (error) {
                showNotification('加载请假记录失败: ' + error.message, 'error');
                console.error('加载请假记录错误:', error);
            }
        }

        // 显示请假记录
        function displayLeaveRecords(leaves) {
            const tbody = document.getElementById('leave-records');
            tbody.innerHTML = '';

            if (!leaves || leaves.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">没有找到请假记录</td></tr>';
                return;
            }

            leaves.forEach(leave => {
                const row = document.createElement('tr');
                const startDate = new Date(leave.startDate);
                const endDate = new Date(leave.endDate);
                const days = (endDate - startDate) / (1000 * 60 * 60 * 24) + 1; // 包含开始和结束日

                row.innerHTML = `
                <td>${leave.leaveType}</td>
                <td>${startDate.toISOString().split('T')[0]} - ${endDate.toISOString().split('T')[0]}</td>
                <td>${days}</td>
                <td>${leave.reason}</td>
                <td class="status-${leave.status}">${leave.status}</td>
                <td>${leave.approveOpinion || '-'}</td>
                <td>
                    ${leave.status === '待审批' ? `<button class="btn btn-sm btn-danger cancel-btn" data-id="${leave.leaveId}">取消</button>` : ''}
                </td>
            `;
                tbody.appendChild(row);
            });

            // 绑定取消按钮事件
            document.querySelectorAll('.cancel-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const leaveId = this.getAttribute('data-id');
                    try {
                        const response = await fetch(`/employee/leave/cancel/${leaveId}`, {
                            method: 'DELETE',
                            credentials: 'include'
                        });

                        if (!response.ok) {
                            throw new Error('取消请假失败');
                        }

                        showNotification('请假已取消', 'success');
                        loadLeaveRecords();
                    } catch (error) {
                        showNotification('取消请假失败: ' + error.message, 'error');
                    }
                });
            });
        }

        // 提交请假申请
        document.getElementById('leave-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const leaveData = {
                leaveType: document.getElementById('leave-type').value,
                startDate: document.getElementById('start-date').value,
                endDate: document.getElementById('end-date').value,
                reason: document.getElementById('reason').value
            };

            try {
                const response = await fetch('/employee/leave/apply', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(leaveData),
                    credentials: 'include'
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || '提交请假申请失败');
                }

                showNotification('请假申请提交成功', 'success');
                this.reset();
                loadLeaveRecords();
            } catch (error) {
                showNotification('提交请假申请失败: ' + error.message, 'error');
                console.error('提交请假申请错误:', error);
            }
        });

        // 初始化页面
        updateAttendanceStatus();
        loadAttendanceRecords();
        loadLeaveRecords();

        // 筛选按钮事件
        document.getElementById('filter-btn').addEventListener('click', loadAttendanceRecords);
        document.getElementById('refresh-btn').addEventListener('click', loadLeaveRecords);
    });
</script>
</body>
</html>
