<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>首页</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
<header class="bg-primary text-white">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center py-3">
            <h1 class="h4 mb-0">员工考勤系统</h1>
            <nav>
                <span class="me-3" th:text="${session.user.empName}"></span>
                <a class="text-white" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> 退出</a>
            </nav>
        </div>
    </div>
</header>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow-sm">
                <div class="card-body py-5">
                    <h2 class="mb-4">欢迎使用员工考勤系统</h2>
                    <p class="lead mb-4">请选择您要进入的系统模块</p>

                    <div th:if="${session.user.role == 'ROLE_MANAGER'}" class="d-grid gap-3 col-md-6 mx-auto">
                        <a href="/admin/attendance" class="btn btn-primary btn-lg">
                            <i class="bi bi-speedometer2"></i> 管理员面板
                        </a>
                    </div>

                    <div th:unless="${session.user.role == 'ROLE_EMPLOYEE'}" class="d-grid gap-3 col-md-6 mx-auto">
                        <a href="/employee/attendance" class="btn btn-primary btn-lg">
                            <i class="bi bi-person-circle"></i> 员工面板
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
