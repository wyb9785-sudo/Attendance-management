<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>请假管理</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script th:src="@{/static/js/admin.js}" defer></script>
    <script th:src="@{/static/js/common.js}" defer></script>
    <script th:src="@{/static/js/employee.js}" defer></script>
</head>
<body>
<header class="bg-primary text-white">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center py-3">
            <h1 class="h4 mb-0">考勤管理系统</h1>
            <nav>
                <a class="text-white mx-2" th:href="@{/admin/attendance}"><i class="bi bi-calendar-check"></i> 考勤管理</a>
                <a class="text-white mx-2" th:href="@{/admin/leave}"><i class="bi bi-clock-history"></i> 请假管理</a>
                <a class="text-white mx-2" th:href="@{/admin/user}"><i class="bi bi-people"></i> 用户管理</a>
                <a class="text-white mx-2" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> 退出</a>
            </nav>
        </div>
    </div>
</header>

<main class="container my-4">
    <div class="card shadow-sm">
        <div class="card-header bg-light">
            <ul class="nav nav-tabs card-header-tabs">
                <li class="nav-item">
                    <a class="nav-link active" href="#" data-bs-toggle="tab" data-bs-target="#pending-tab">待审批</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-bs-toggle="tab" data-bs-target="#all-tab">全部记录</a>
                </li>
            </ul>
        </div>

        <div class="card-body">
            <div class="tab-content">
                <!-- 待审批请假 -->
                <div class="tab-pane fade show active" id="pending-tab">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="h5 mb-0">待审批请假申请</h2>
                        <div class="d-flex">
                            <select class="form-select form-select-sm me-2" id="pending-filter">
                                <option value="all">全部类型</option>
                                <option value="事假">事假</option>
                                <option value="病假">病假</option>
                                <option value="公假">公假</option>
                            </select>
                            <button id="refresh-pending" class="btn btn-sm btn-primary">
                                <i class="bi bi-arrow-clockwise"></i> 刷新
                            </button>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead class="table-light">
                            <tr>
                                <th>申请人</th>
                                <th>部门</th>
                                <th>类型</th>
                                <th>日期</th>
                                <th>天数</th>
                                <th>事由</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody id="pending-leaves">
                            <!-- 数据将通过JS动态加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 全部请假记录 -->
                <div class="tab-pane fade" id="all-tab">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="h5 mb-0">全部请假记录</h2>
                        <div class="d-flex">
                            <select class="form-select form-select-sm me-2" id="status-filter">
                                <option value="all">全部状态</option>
                                <option value="待审批">待审批</option>
                                <option value="已通过">已通过</option>
                                <option value="已驳回">已驳回</option>
                            </select>
                            <select class="form-select form-select-sm me-2" id="type-filter">
                                <option value="all">全部类型</option>
                                <option value="事假">事假</option>
                                <option value="病假">病假</option>
                                <option value="公假">公假</option>
                            </select>
                            <button id="refresh-all" class="btn btn-sm btn-primary">
                                <i class="bi bi-arrow-clockwise"></i> 刷新
                            </button>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead class="table-light">
                            <tr>
                                <th>申请人</th>
                                <th>部门</th>
                                <th>类型</th>
                                <th>日期</th>
                                <th>天数</th>
                                <th>状态</th>
                                <th>审批人</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody id="all-leaves">
                            <!-- 数据将通过JS动态加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 审批模态框 -->
    <div class="modal fade" id="approveModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">审批请假申请</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="approve-form">
                        <input type="hidden" id="leaveId">
                        <div class="mb-3">
                            <label class="form-label">审批结果</label>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="status" id="approve" value="已通过" checked>
                                    <label class="form-check-label" for="approve">通过</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="status" id="reject" value="已驳回">
                                    <label class="form-check-label" for="reject">驳回</label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="approveOpinion" class="form-label">审批意见</label>
                            <textarea class="form-control" id="approveOpinion" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="submit-approve">提交</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const approveModal = new bootstrap.Modal(document.getElementById('approveModal'));


        // 添加获取详细信息的函数
        async function fetchLeaveDetails(leaveId) {
            try {
                const leave = await fetchData(`/admin/leave/details/${leaveId}`);
                showLeaveDetailsModal(leave);
            } catch (error) {
                showNotification('获取请假详情失败: ' + error.message, 'error');
            }
        }

        function showLeaveDetailsModal(leave) {
            // 创建或显示一个模态框来展示详细信息
            const modalHtml = `
        <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">请假详情</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <strong>申请人:</strong> ${leave.empName}
                            </div>
                            <div class="col-md-6">
                                <strong>部门:</strong> ${leave.deptName}
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <strong>请假类型:</strong> ${leave.leaveType}
                            </div>
                            <div class="col-md-6">
                                <strong>状态:</strong> ${leave.status}
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <strong>开始日期:</strong> ${formatDate(leave.startDate)}
                            </div>
                            <div class="col-md-6">
                                <strong>结束日期:</strong> ${formatDate(leave.endDate)}
                            </div>
                        </div>
                        <div class="mb-3">
                            <strong>请假事由:</strong>
                            <p>${leave.reason}</p>
                        </div>
                        ${leave.approveOpinion ? `
                        <div class="mb-3">
                            <strong>审批意见:</strong>
                            <p>${leave.approveOpinion}</p>
                        </div>
                        ` : ''}
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    </div>
                </div>
            </div>
        </div>
    `;

            // 将模态框添加到DOM
            const modalContainer = document.createElement('div');
            modalContainer.innerHTML = modalHtml;
            document.body.appendChild(modalContainer);

            // 显示模态框
            const modal = new bootstrap.Modal(document.getElementById('detailsModal'));
            modal.show();

            // 模态框关闭后移除
            document.getElementById('detailsModal').addEventListener('hidden.bs.modal', function() {
                document.body.removeChild(modalContainer);
            });
        }
        // 加载待审批请假
        async function loadPendingLeaves() {
            try {
                const filterElement = document.getElementById('pending-filter');
                if (!filterElement) return; // 如果元素不存在，直接返回

                const type = filterElement.value;
                const leaves = await fetchData(`/admin/leave/pending?type=${type}`);
                renderPendingLeaves(leaves);
            } catch (error) {
                showNotification('加载待审批请假失败: ' + error.message, 'error');
            }
        }

        // 加载全部请假记录
        async function loadAllLeaves() {
            const statusElement = document.getElementById('status-filter');
            const typeElement = document.getElementById('type-filter');
            if (!statusElement || !typeElement) return; // 如果元素不存在，直接返回

            const status = statusElement.value;
            const type = typeElement.value;
            const leaves = await fetchData(`/admin/leave/all?status=${status}&type=${type}`);
            renderAllLeaves(leaves);

        }


        // 渲染待审批请假
        function renderPendingLeaves(leaves) {
            const tbody = document.getElementById('pending-leaves');
            tbody.innerHTML = '';

            if (leaves.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">没有待审批的请假申请</td></tr>';
                return;
            }

            leaves.forEach(leave => {
                const row = document.createElement('tr');
                const startDate = new Date(leave.startDate);
                const endDate = new Date(leave.endDate);
                const days = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;

                row.innerHTML = `
                <td>${leave.empName}</td>
                <td>${leave.deptName}</td>
                <td>${leave.leaveType}</td>
                <td>${formatDate(leave.startDate)} 至 ${formatDate(leave.endDate)}</td>
                <td>${days}天</td>
                <td>${leave.reason}</td>
                <td>
                    <button class="btn btn-sm btn-primary approve-btn" data-id="${leave.leaveId}">
                        <i class="bi bi-check-circle"></i> 审批
                    </button>
                </td>
            `;
                tbody.appendChild(row);
            });

            // 绑定审批按钮事件
            document.querySelectorAll('.approve-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const leaveId = this.getAttribute('data-id');
                    document.getElementById('leaveId').value = leaveId;
                    approveModal.show();
                });
            });
        }

        // 渲染全部请假记录
        function renderAllLeaves(leaves) {
            const tbody = document.getElementById('all-leaves');
            tbody.innerHTML = '';

            if (leaves.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">没有找到请假记录</td></tr>';
                return;
            }

            leaves.forEach(leave => {
                const row = document.createElement('tr');
                const startDate = new Date(leave.startDate);
                const endDate = new Date(leave.endDate);
                const days = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;

                row.innerHTML = `
                <td>${leave.empName}</td>
                <td>${leave.deptName}</td>
                <td>${leave.leaveType}</td>
                <td>${formatDate(leave.startDate)} 至 ${formatDate(leave.endDate)}</td>
                <td>${days}天</td>
                <td class="status-${getStatusClass(leave.status)}">${leave.status}</td>
                <td>${leave.approverName || '-'}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary view-btn" data-id="${leave.leaveId}">
                        <i class="bi bi-eye"></i> 查看
                    </button>
                </td>
            `;
                tbody.appendChild(row);
            });

            // 在生成按钮后绑定事件监听器
            bindViewButtonEvents();
        }

        // 绑定查看按钮事件
        function bindViewButtonEvents() {
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const leaveId = this.getAttribute('data-id');
                    fetchLeaveDetails(leaveId);
                });
            });
        }

        // 获取状态样式类
        function getStatusClass(status) {
            switch (status) {
                case '待审批': return 'text-warning';
                case '已通过': return 'text-success';
                case '已驳回': return 'text-danger';
                default: return '';
            }
        }

        // 提交审批
        document.getElementById('submit-approve').addEventListener('click', async function() {
            const leaveId = document.getElementById('leaveId').value;
            const status = document.querySelector('input[name="status"]:checked').value;
            const approveOpinion = document.getElementById('approveOpinion').value;

            try {
                const formData = new FormData();
                formData.append('leaveId', leaveId);
                formData.append('status', status);
                if (approveOpinion) {
                    formData.append('approveOpinion', approveOpinion);
                }

                const response = await fetch('/admin/leave/approve', {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });

                const result = await response.json();
                if (!result.success) {
                    throw new Error(result.message);
                }

                showNotification('审批提交成功', 'success');
                approveModal.hide();
                loadPendingLeaves();
                loadAllLeaves();
            } catch (error) {
                showNotification('审批提交失败: ' + error.message, 'error');
                console.error('审批错误:', error);
            }
        });

        // 刷新按钮事件
        document.getElementById('refresh-pending').addEventListener('click', loadPendingLeaves);
        document.getElementById('refresh-all').addEventListener('click', loadAllLeaves);

        // 筛选器变化事件
        document.getElementById('pending-filter').addEventListener('change', loadPendingLeaves);
        document.getElementById('status-filter').addEventListener('change', loadAllLeaves);
        document.getElementById('type-filter').addEventListener('change', loadAllLeaves);


        // 通用AJAX请求函数
        async function fetchData(url, method = 'GET', data = null) {
            try {
                const options = {
                    method,
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                };

                if (data) {
                    options.body = new URLSearchParams(data).toString();
                }

                const response = await fetch(url, options);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // 根据内容类型解析响应
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    return response.json();
                } else {
                    return response.text();
                }
            } catch (error) {
                console.error('Fetch error:', error);
                throw error;
            }
        }

        // 初始化页面
        loadPendingLeaves();
        loadAllLeaves();
    });
</script>
</body>
</html>
